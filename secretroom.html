<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador de Habitaciones - Isaac (Plantilla)</title>
    <style>
        body {
            background: #222;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(13, 32px);
            grid-template-rows: repeat(13, 32px);
            gap: 2px;
            margin: 30px auto;
            width: max-content;
            background: #111;
            border: 4px solid #444;
            border-radius: 10px;
        }

        .cell {
            width: 32px;
            height: 32px;
            background: #333;
            border-radius: 4px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            user-select: none;
        }

        .normal {
            background: #2196f3;
        }

        .boss {
            background: #ff5722;
        }

        .secret {
            background: #ffd700;
            color: #222;
        }

        .ultrasecret {
            background: #e91e63;
            color: #fff;
        }

        .deadend {
            background: #1976d2;
        }

        .start {
            background: #4caf50;
        }
    </style>
</head>

<body>
    <h1>Simulador de Habitaciones (Plantilla)</h1>
    <div id="grid"></div>
    <script>
        const ROOM_TYPES = {
            normal: { size: [[0, 0]], exits: [[1, 0], [-1, 0], [0, 1], [0, -1]] }, // 1x1
            narrowH: { size: [[0, 0]], exits: [[1, 0], [-1, 0]] }, // pasillo horizontal
            narrowV: { size: [[0, 0]], exits: [[0, 1], [0, -1]] }, // pasillo vertical
            large: { size: [[0, 0], [1, 0], [0, 1], [1, 1]], exits: [[-1, 0], [2, 0], [0, -1], [0, 2], [1, -1], [1, 2], [2, 1], [-1, 1]] }, // 2x2
            L1: { size: [[0, 0], [1, 0], [0, 1]], exits: [[-1, 0], [0, -1], [1, 1], [2, 0], [0, 2]] }, // L esquina superior izquierda
            // Puedes definir L2, L3, L4 para las otras orientaciones de L
        };
        const SIZE = 13;
        // Tipos posibles: normal, boss, secret, ultrasecret, deadend, start, etc.
        function emptyGrid() {
            return Array.from({ length: SIZE }, () =>
                Array.from({ length: SIZE }, () => ({
                    type: null // Aquí defines el tipo de habitación
                }))
            );
        }

        // Funciones base para manipular habitaciones
        function setRoomType(x, y, type) {

        function countNormalAdjacents(x, y) {
            const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
            let count = 0;
            for (const [dx, dy] of dirs) {
                const nx = x + dx, ny = y + dy;
                if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && grid[nx][ny].type === 'normal') {
                    count++;
                }
            }
            return count;
        }

        function canPlaceRoom(x, y, type) {
            const def = ROOM_TYPES[type];
            for (const [dx, dy] of def.size) {
                const nx = x + dx, ny = y + dy;
                if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE || grid[nx][ny].type) {
                    return false;
                }
            }
            return true;
        }
        function placeRoom(x, y, type) {
                    function emptyGrid() {
                        return Array.from({ length: SIZE }, () =>
                            Array.from({ length: SIZE }, () => ({
                                type: null,
                                roomType: null // Guarda el tipo de habitación (normal, large, etc.)
                            }))
                        );
                    }

                    // Comprueba si una habitación de cierto tipo cabe en la posición
                    function canPlaceRoom(x, y, roomType) {
                        const def = ROOM_TYPES[roomType];
                        for (const [dx, dy] of def.size) {
                            const nx = x + dx, ny = y + dy;
                            if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE || grid[nx][ny].type) {
                                return false;
                            }
                        }
                        return true;
                    }

                    // Coloca una habitación de cierto tipo
                    function placeRoom(x, y, roomType) {
                        const def = ROOM_TYPES[roomType];
                        for (const [dx, dy] of def.size) {
                            grid[x + dx][y + dy].type = roomType;
                            grid[x + dx][y + dy].roomType = roomType;
                        }
                    }

                    // Devuelve las posiciones adyacentes válidas para expansión
                    function getRoomExits(x, y, roomType) {
                        const def = ROOM_TYPES[roomType];
                        let exits = [];
                        for (const [dx, dy] of def.exits) {
                            const nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !grid[nx][ny].type) {
                                exits.push([nx, ny]);
                            }
                        }
                        return exits;
                    }

                    // Inicializa el grid y coloca una habitación normal en el centro
                    let grid = emptyGrid();
                    const center = Math.floor(SIZE / 2);
                    placeRoom(center, center, 'normal');

                    // Renderizado simple
                    function renderGrid() {
                        const gridDiv = document.getElementById('grid');
                        gridDiv.innerHTML = '';
                        for (let x = 0; x < SIZE; x++) {
                            for (let y = 0; y < SIZE; y++) {
                                const cell = document.createElement('div');
                                cell.className = 'cell';
                                const t = grid[x][y].type;
                                if (t) cell.classList.add(t);
                                // Muestra la letra del tipo de habitación
                                cell.textContent = t ? (ROOM_TYPES[t]?.label || t[0].toUpperCase()) : '';
                                gridDiv.appendChild(cell);
                            }
                        }
                    }

                    renderGrid();

                    // Exporta funciones al global para pruebas manuales
                    window.canPlaceRoom = canPlaceRoom;
                    window.placeRoom = placeRoom;
                    window.getRoomExits = getRoomExits;
                    window.renderGrid = renderGrid;
                    window.grid = grid;
            const def = ROOM_TYPES[type];
            for (const [dx, dy] of def.size) {
                grid[x + dx][y + dy].type = type;
            }
        }
        function getRoomExits(x, y, type) {
            const def = ROOM_TYPES[type];
            let exits = [];
            for (const [dx, dy] of def.exits) {
                const nx = x + dx, ny = y + dy;
                if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !grid[nx][ny].type) {
                    exits.push([nx, ny]);
                }
            }
            return exits;
        }

        function expandRoomsFromCenter() {
            // Limpia el grid
            grid = emptyGrid();
            setRoomType(center, center, 'normal');
            let totalRooms = getRoomCount();
            let placed = 1;
            let queue = [[center, center]];
            let visited = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
            visited[center][center] = true;

            while (placed < totalRooms && queue.length > 0) {
                const [x, y] = queue.shift();
                let dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]].sort(() => Math.random() - 0.5);
                for (const [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (
                        nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE &&
                        !grid[nx][ny].type
                    ) {
                        // Solo añade si conecta con una ya existente (siempre cierto aquí)
                        setRoomType(nx, ny, 'normal');
                        queue.push([nx, ny]);
                        placed++;
                        if (placed >= totalRooms) break;
                    }
                }
            }
        }

        function getRoomType(x, y) {
            if (x >= 0 && x < SIZE && y >= 0 && y < SIZE) {
                return grid[x][y].type;
            }
            return null;
        }

        function getDeadEnds() {
            let deadEnds = [];
            for (let x = 0; x < SIZE; x++) {
                for (let y = 0; y < SIZE; y++) {
                    if (grid[x][y].type === 'normal' && countNormalAdjacents(x, y) === 1) {
                        deadEnds.push([x, y]);
                    }
                }
            }
            return deadEnds;
        }

        function generateValidMap() {
            let tries = 0;
            let deadEnds = [];
            do {
                expandRoomsFromCenter();
                deadEnds = getDeadEnds();
                tries++;
                // Evita bucles infinitos
                if (tries > 50) break;
            } while (deadEnds.length < 5);
            renderGrid();
            // Puedes marcar los dead ends visualmente si quieres:
            // for (const [x, y] of deadEnds) setRoomType(x, y, 'deadend');
        }

        // Ejemplo: inicializa solo una habitación normal en el centro
        let grid = emptyGrid();
        const center = Math.floor(SIZE / 2);
        setRoomType(center, center, 'normal');
        expandRoomsFromCenter();

        // Renderizado simple
        function renderGrid() {
            const gridDiv = document.getElementById('grid');
            gridDiv.innerHTML = '';
            for (let x = 0; x < SIZE; x++) {
                for (let y = 0; y < SIZE; y++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const t = grid[x][y].type;
                    if (t) cell.classList.add(t);
                    cell.textContent = t ? t[0].toUpperCase() : '';
                    gridDiv.appendChild(cell);
                }
            }
        }

        // Llama a renderGrid para mostrar el mapa inicial
        renderGrid();

        // Exporta funciones al global para que puedas probar en consola
        window.setRoomType = setRoomType;
        window.getRoomType = getRoomType;
        window.renderGrid = renderGrid;
        window.grid = grid;
    </script>
</body>

</html>
